<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 130" role="img" aria-label="TrajectoireDroit — La nouvelle école du droit">
  <defs>
    <linearGradient id="metalGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4A4A4A"/>
      <stop offset="0.3" stop-color="#1A1A1A"/>
      <stop offset="0.7" stop-color="#0F0F0F"/>
      <stop offset="1" stop-color="#2A2A2A"/>
    </linearGradient>
    <linearGradient id="blueAccent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3B5BD9"/>
      <stop offset="0.5" stop-color="#1E3A8A"/>
      <stop offset="1" stop-color="#0A1A4A"/>
    </linearGradient>
    <filter id="logoShadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Monogramme TJD : T, J, D imbriqués en serif épais avec effet 3D métallique -->
  <g filter="url(#logoShadow)" font-family="Georgia, 'Times New Roman', serif" font-weight="700">
    <text x="5" y="100" font-size="135" fill="url(#metalGrad)" letter-spacing="-8">T</text>
    <text x="58" y="115" font-size="135" fill="url(#metalGrad)" letter-spacing="-8">J</text>
    <text x="105" y="100" font-size="135" fill="url(#metalGrad)" letter-spacing="-8">D</text>
  </g>

  <!-- Accent bleu cobalt courbé entre J et D -->
  <path d="M 118 70 Q 138 85 152 110 Q 138 95 118 100 Q 118 85 118 70 Z" fill="url(#blueAccent)" opacity="0.92"/>

  <!-- Texte "Trajectoire" puis "Droit" — séparation propre avec tspan -->
  <text x="225" y="83" font-family="Georgia, 'Times New Roman', serif" font-weight="500" font-size="52" letter-spacing="-0.3">
    <tspan fill="#1A1A1A">Trajectoire</tspan><tspan dx="6" fill="#1E3A8A">Droit</tspan>
  </text>
</svg>
